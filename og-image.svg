<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="507" cy="465" r="95" fill="#b91c1c" opacity="0.12"/>
    <circle cx="807" cy="511" r="85" fill="#b91c1c" opacity="0.10"/>
    <circle cx="911" cy="109" r="89" fill="#b91c1c" opacity="0.06"/>
    <circle cx="820" cy="366" r="97" fill="#b91c1c" opacity="0.08"/>
    <circle cx="209" cy="565" r="74" fill="#b91c1c" opacity="0.10"/>
    <circle cx="856" cy="264" r="54" fill="#b91c1c" opacity="0.12"/>
    <rect x="497" y="69" width="55" height="28" rx="8" fill="#dc2626" opacity="0.05" transform="rotate(12, 321, 299)"/>
    <rect x="1260" y="495" width="71" height="96" rx="8" fill="#dc2626" opacity="0.13" transform="rotate(4, 905, 711)"/>
    <rect x="72" y="478" width="85" height="88" rx="8" fill="#dc2626" opacity="0.06" transform="rotate(11, 708, 403)"/>
    <rect x="577" y="515" width="44" height="35" rx="8" fill="#dc2626" opacity="0.09" transform="rotate(18, 1067, -59)"/>
    <rect x="585" y="615" width="56" height="83" rx="8" fill="#dc2626" opacity="0.07" transform="rotate(41, 241, 99)"/>
    <rect x="826" y="331" width="84" height="64" rx="8" fill="#dc2626" opacity="0.11" transform="rotate(43, 336, 644)"/>
    <rect x="1262" y="34" width="38" height="64" rx="8" fill="#dc2626" opacity="0.13" transform="rotate(7, 389, -33)"/>
    <rect x="307" y="83" width="35" height="66" rx="8" fill="#dc2626" opacity="0.05" transform="rotate(37, 317, 312)"/>
    <polygon points="1012,68 1048,140 976,140" fill="#b91c1c" opacity="0.07"/>
    <polygon points="921,-67 942,-25 900,-25" fill="#b91c1c" opacity="0.04"/>
    <polygon points="543,476 600,590 486,590" fill="#b91c1c" opacity="0.09"/>
    <polygon points="1278,555 1347,693 1209,693" fill="#b91c1c" opacity="0.06"/>

  <!-- Wave at bottom -->
  <path d="M0,548 C360,589 840,507 1200,548 L1200,630 L0,630Z" fill="#b91c1c" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    백링크 자동화 프로그램
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — LLM비교
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fbbf24" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 백링크 자동화 프로그램 — LLM비교
  </text>
</svg>